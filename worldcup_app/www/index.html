<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: gap: https://ssl.gstatic.com; connect-src 'self' https://site.api.espn.com https://*.espn.com https://*.espncdn.com; img-src 'self' data: https: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval';">
    <title>世界杯追踪器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh;
            padding-bottom: 20px;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 16px;
            text-align: center;
            border-bottom: 2px solid #e94560;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 20px; color: #fff; }
        .header p { font-size: 12px; color: #888; margin-top: 4px; }
        .tabs {
            display: flex;
            background: #1a1a2e;
            position: sticky;
            top: 56px;
            z-index: 99;
        }
        .tab {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            color: #888;
        }
        .tab.active {
            color: #e94560;
            border-bottom-color: #e94560;
            background: rgba(233,69,96,0.08);
        }
        .container { max-width: 600px; margin: 0 auto; padding: 12px; }
        .match-card {
            background: #1a1a2e;
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
            border-left: 4px solid #333;
        }
        .match-card.live { border-left-color: #e94560; animation: pulse 2s infinite; }
        .match-card.finished { border-left-color: #4ecca3; opacity: 0.85; }
        .match-card.upcoming { border-left-color: #3498db; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(233,69,96,0);} 50%{box-shadow:0 0 8px 2px rgba(233,69,96,0.3);} }
        .match-time {
            font-size: 11px;
            color: #888;
            padding: 6px 12px;
            background: #151528;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .live-badge {
            background: #e94560;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        .teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
        }
        .team { text-align: center; flex: 1; }
        .team-name { font-size: 13px; font-weight: 600; margin-top: 4px; word-break: break-word; }
        .flag { font-size: 32px; line-height: 1; }
        .score-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 12px;
            min-width: 50px;
        }
        .score { font-size: 22px; font-weight: bold; color: #fff; }
        .status-text { font-size: 11px; color: #e94560; margin-top: 2px; font-weight: 600; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 14px;
        }
        .spinner {
            width: 30px; height: 30px;
            border: 3px solid #333;
            border-top-color: #e94560;
            border-radius: 50%;
            margin: 0 auto 12px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to{transform:rotate(360deg);} }
        .error-msg {
            text-align: center;
            padding: 30px;
            color: #e94560;
            font-size: 13px;
            background: rgba(233,69,96,0.08);
            border-radius: 10px;
            margin: 20px 0;
        }
        .retry-btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 12px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 14px;
        }
        .filter-bar {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            overflow-x: auto;
            background: #151528;
        }
        .filter-btn {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 11px;
            border: 1px solid #333;
            background: transparent;
            color: #888;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .filter-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
        }
        .date-header {
            font-size: 12px;
            color: #666;
            padding: 10px 4px 4px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>⚽ 世界杯追踪器</h1>
    <p>2026 FIFA World Cup · 实时赛况</p>
</div>

<div class="tabs" id="tabs">
    <div class="tab active" data-tab="matches">📋 赛程</div>
    <div class="tab" data-tab="standings">🏆 积分榜</div>
</div>

<div class="filter-bar" id="filterBar" style="display:none;">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="live">进行中</button>
    <button class="filter-btn" data-filter="finished">已结束</button>
    <button class="filter-btn" data-filter="upcoming">未开始</button>
</div>

<div class="container" id="content">
    <div class="loading"><div class="spinner"></div>加载中...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.2/axios.min.js"></script>
<script>
const API_BASE = 'https://site.api.espn.com/apis/v2/sports/soccer/world-cup/2026';
let currentTab = 'matches';
let currentFilter = 'all';
let allMatches = [];
let allGroups = [];

document.getElementById('tabs').addEventListener('click', function(e) {
    const tab = e.target.dataset.tab;
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    currentTab = tab;
    const filterBar = document.getElementById('filterBar');
    filterBar.style.display = tab === 'matches' ? 'flex' : 'none';
    render();
});

document.getElementById('filterBar').addEventListener('click', function(e) {
    const f = e.target.dataset.filter;
    if (!f) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = f;
    render();
});

async function fetchData(url) {
    try {
        const res = await axios.get(url, { timeout: 15000 });
        return res.data;
    } catch (err) {
        console.error('API error:', url, err);
        throw err;
    }
}

function getStatus(match) {
    const s = match.status || {};
    const type = s.type || {};
    if (type.name === 'STATUS_IN_PROGRESS') {
        return { cls: 'live', text: '🔴 ' + (s.displayClock || "LIVE"), isLive: true };
    }
    if (type.name === 'STATUS_FINAL') {
        return { cls: 'finished', text: '完场', isLive: false };
    }
    if (type.name === 'STATUS_SCHEDULED') {
        const d = new Date(match.date);
        return { cls: 'upcoming', text: (d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'), isLive: false };
    }
    return { cls: '', text: s.type?.name || s.description || '-', isLive: false };
}

function getTeamFlag(team) {
    if (team.logos && team.logos.length > 0) return team.logos[0].href;
    return null;
}

function renderMatch(m) {
    const st = getStatus(m);
    const t1 = m.competitors[0];
    const t2 = m.competitors[1];
    const flag1 = getTeamFlag(t1.team);
    const flag2 = getTeamFlag(t2.team);
    const score1 = t1.score !== undefined && t1.score !== null ? t1.score : '-';
    const score2 = t2.score !== undefined && t2.score !== null ? t2.score : '-';

    let cardClass = 'match-card ' + st.cls;

    return `<div class="${cardClass}">
        <div class="match-time">
            <span>${m.date ? new Date(m.date).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric',weekday:'short'}) : ''}</span>
            <span class="${st.isLive ? 'live-badge' : ''}">${st.text}</span>
        </div>
        <div class="teams">
            <div class="team">
                ${flag1 ? `<img src="${flag1}" class="flag" onerror="this.textContent='🏴';this.onerror=null;" style="width:32px;height:24px;object-fit:cover;border-radius:2px;">` : '<span class="flag">🏴</span>'}
                <div class="team-name">${t1.team.displayName || '-'}</div>
            </div>
            <div class="score-area">
                <div class="score">${score1} - ${score2}</div>
                <div class="status-text">${st.cls==='live'?(st.text):''}</div>
            </div>
            <div class="team">
                ${flag2 ? `<img src="${flag2}" class="flag" onerror="this.textContent='🏴';this.onerror=null;" style="width:32px;height:24px;object-fit:cover;border-radius:2px;">` : '<span class="flag">🏴</span>'}
                <div class="team-name">${t2.team.displayName || '-'}</div>
            </div>
        </div></div>`;
}

function renderStandings() {
    if (!allGroups.length) return '<div class="loading"><div class="spinner"></div>加载积分榜中...</div>';
    let html = '';
    allGroups.forEach(g => {
        html += `<div class="date-header">${g.label || g.name || '小组'} (前2名晋级)</div>`;
        (g.standings||g.table||[]).forEach((row,i) => {
            const t = row.team || row;
            const pts = row.points || row.pts || 0;
            const played = row.played || row.matchesPlayed || 0;
            const gd = row.goalDiff || row.goalDifference || 0;
            const gf = row.goalsFor || row.goalsScored || 0;
            const ga = row.goalsAgainst || row.goalsConceded || 0;
            const qual = i < 2 ? ' 🟢' : '';
            html += `<div class="match-card" style="padding:8px 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px;">
                <span style="font-weight:${i<2?700:400}">${i+1}. ${t.displayName||t.name||'-'}${qual}</span>
                <span style="color:#aaa;font-size:12px">${played}场 ${gf}-${ga} (${gd>=0?'+':''}${gd}) <b style="color:#fff;margin-left:6px">${pts}分</b></span>
            </div>`;
        });
    });
    return html || '<div class="empty-state">暂无积分榜数据</div>';
}

function render() {
    const el = document.getElementById('content');
    if (currentTab === 'standings') { el.innerHTML = renderStandings(); return; }

    let matches = allMatches.filter(m => {
        if (currentFilter === 'all') return true;
        const s = getStatus(m);
        if (currentFilter === 'live') return s.isLive;
        if (currentFilter === 'finished') return s.cls === 'finished';
        if (currentFilter === 'upcoming') return s.cls === 'upcoming';
        return true;
    });

    if (!matches.length) {
        el.innerHTML = '<div class="empty-state">该条件下暂无比赛</div>';
        return;
    }

    let lastDate = '';
    let html = '';
    matches.forEach(m => {
        const d = m.date ? new Date(m.date).toLocaleDateString('zh-CN') : '';
        if (d && d !== lastDate) { lastDate = d; html += `<div class="date-header">${d}</div>`; }
        html += renderMatch(m);
    });
    el.innerHTML = html;
}

async function loadAll() {
    try {
        showLoading();
        const [matchesData, standingsData] = await Promise.all([
            fetchData(API_BASE + '/scoreboard'),
            fetch(API_BASE + '/standings').then(r => r.json()).catch(() => null)
        ]);
        allMatches = matchesData.events || [];
        allGroups = standingsData ? (standingsData.groups || standingsData.children || []) : [];
        if (!allMatches.length) throw new Error('无比赛数据');
        render();
    } catch (err) {
        console.error(err);
        showError(err.message || '网络请求失败，请检查网络连接');
    }
}

function showLoading() {
    document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
}
function showError(msg) {
    document.getElementById('content').innerHTML = `<div class="error-msg">⚠️ ${msg}<button class="retry-btn" onclick="loadAll()">重新加载</button></div>`;
}

loadAll();
setInterval(loadAll, 120000);
</script>
</body>
</html>
