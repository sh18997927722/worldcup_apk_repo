name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'worldcup_app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 10406996

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install dependencies
        run: cd worldcup_app && npm ci

      - name: Sync Capacitor
        run: cd worldcup_app && npx cap sync android

      - name: Build Android APK
        run: cd worldcup_app/android && chmod +x gradlew && ./gradlew assembleDebug


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: worldcup-apk
          path: worldcup_app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: worldcup_app/android/app/build/outputs/
          if-no-files-found: ignore
