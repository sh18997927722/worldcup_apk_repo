name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          cd worldcup_app
          npm install
          npx cap sync android

      - name: Build APK
        run: |
          cd worldcup_app/android
          chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: worldcup-apk
          path: worldcup_app/android/app/build/outputs/apk/debug/app-debug.apk
